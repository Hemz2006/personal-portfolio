<style>
  :root {
    --bg: oklch(97.5% 0.002 60);
    --bg-elev: oklch(99% 0.0015 60);
    --ink: oklch(14% 0 0);
    --ink-soft: oklch(34% 0.003 60);
    --ink-mute: oklch(60% 0.005 60);
    --rule: oklch(86% 0.004 60);
    --rule-soft: oklch(92% 0.003 60);
    --accent: oklch(48% 0.16 25);
    --accent-soft: oklch(92% 0.04 25);
    --serif: "Instrument Serif", "Times New Roman", Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }

  /* selection */
  ::selection { background: var(--accent); color: var(--bg); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

  /* utility */
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; }
  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .serif-italic { font-family: var(--serif); font-style: italic; font-weight: 400; }

  /* grain */
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    opacity: 0.035; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ----- placeholder striped panel ----- */
  .stripe-fill {
    background-image: repeating-linear-gradient(
      135deg,
      var(--rule-soft) 0 1px,
      transparent 1px 9px
    );
    background-color: var(--bg-elev);
  }

  /* ----- hero canvas cursor ----- */
  .cursor-dot {
    position: fixed; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); pointer-events: none; z-index: 999;
    transform: translate(-50%, -50%); transition: opacity 0.2s, width 0.2s, height 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-dot.big { width: 36px; height: 36px; opacity: 0.6; }

  /* hide native cursor on touch */
  @media (hover: none) { .cursor-dot { display: none; } }

  /* fade-in on enter */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* link underline */
  .link {
    position: relative; display: inline-flex; align-items: baseline; gap: 6px;
    color: var(--ink);
  }
  .link::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
    background: currentColor; transform: scaleX(1); transform-origin: right;
    transition: transform 0.4s cubic-bezier(.7,0,.2,1);
  }
  .link:hover::after { transform: scaleX(0); transform-origin: left; }
  .link .arrow { display: inline-block; transition: transform 0.3s; }
  .link:hover .arrow { transform: translate(2px, -2px); }

  /* root */
  #root { min-height: 100vh; }
</style>
